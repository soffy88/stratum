use_default_settings: true

general:
  debug: false
  instance_name: "Stratum Search"
  enable_metrics: false

search:
  safe_search: 0
  autocomplete: "google"
  default_lang: "auto"
  formats:
    - html
    - json

server:
  port: 8080
  bind_address: "0.0.0.0"
  secret_key: "stratum-searxng-local-only-key-change-me"
  limiter: false
  public_instance: false

ui:
  static_use_hash: false
  default_theme: simple

outgoing:
  request_timeout: 10.0
  max_request_timeout: 30.0
  # Uncomment to use host proxy (sing-box):
  # proxies:
  #   http: "socks5://host.docker.internal:1080"
  #   https: "socks5://host.docker.internal:1080"

engines:
  - name: google
    engine: google
    shortcut: g
    disabled: false
  - name: bing
    engine: bing
    shortcut: b
    disabled: false
  - name: duckduckgo
    engine: duckduckgo
    shortcut: d
    disabled: false
  - name: arxiv
    engine: arxiv
    shortcut: ax
    categories: science
    disabled: false
  - name: wikipedia
    engine: wikipedia
    shortcut: w
    disabled: false
