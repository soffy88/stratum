services:
  aii-cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: aii-cloudflared
    restart: unless-stopped
    # Dashboard-managed (remote) ingress, matching the working stratum/helios
    # tunnels. The prior hybrid `--config ... run --token` was invalid (token
    # already carries the tunnel identity) and crash-looped. Local ingress config
    # is kept in aii/.cloudflared-cfg/config.yml as reference / locally-managed fallback.
    command: tunnel --no-autoupdate run --token ${AII_TUNNEL_TOKEN}
    env_file:
      - /home/soffy/.config/keys/.env
    volumes:
      # Config moved into the stratum repo after the AII→stratum merge (old
      # /home/soffy/projects/AII path was emptied, crashing the tunnel).
      - /home/soffy/projects/stratum/aii/.cloudflared-cfg:/etc/cloudflared:ro
    network_mode: host
