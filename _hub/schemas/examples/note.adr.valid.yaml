context: "Stratum 需要对外暴露接口供 hevi、Hermes、Obsidian 等消费者访问。候选方案: 纯 MCP、纯 HTTP REST、MCP + HTTP 双协议。"
decision: "采用 MCP + HTTP 双协议。MCP 服务 Claude Code / Hermes (AI agent) 场景, HTTP REST 服务 hevi / 未来 web UI 场景。两者共享底层 search 和 fetch 实现。"
consequences: "需维护两套路由层, 但底层逻辑共享。MCP 优先实现, HTTP 作为 batch 3+ 工作。"

