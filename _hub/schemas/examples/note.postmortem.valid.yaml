impact: "生产数据处理延迟约 6 小时, 约 4000 条消息积压。无数据丢失, 最终全部处理完成。"

root_causes:
  - "RabbitMQ 服务端 heartbeat_timeout=60s, 客户端 pika 默认 heartbeat=0 (禁用)。网络层 NAT 会话超时 (~5min) 导致连接被悄悄断开。"
  - "消费者未监控 channel active 状态, 断开后不重连也不报错。"
  - "告警只监控队列深度绝对值, 未监控消费速率下降。"

action_items:
  - description: "pika 连接设置 heartbeat=30"
    owner: "wiki"
    due_date: "2026-03-15"
    done: true
  - description: "增加消费速率 = 0 持续 5min 的告警"
    owner: "wiki"
    due_date: "2026-03-21"
    done: true
  - description: "所有 worker 加 connection reset 自动重连逻辑"
    owner: "wiki"
    due_date: "2026-03-28"
    done: false

resolution: "修改 pika heartbeat 参数, 增加消费速率监控, 问题未再复现。"

