version: '3.9'

services:
  stratum-api:
    image: stratum-api:latest
    container_name: stratum-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:9309:9302"
    volumes:
      - ~/.stratum:/root/.stratum
      # Live source mount — auth.py path change takes effect without image rebuild
      - /home/soffy/projects/stratum/src:/app/src
    env_file:
      - /home/soffy/.config/keys/.env
    environment:
      - STRATUM_ENV=production
      - DATABASE_PATH=/data/stratum/meta.duckdb
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9302/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  stratum-web:
    # Build offline (Docker Hub blocked): BUILDX_BUILDER=default docker compose build stratum-web
    # Or use the explicit command in Dockerfile.web header comments.
    image: stratum-web:latest
    build:
      context: /home/soffy/projects/stratum/stratum-web
      dockerfile: /home/soffy/projects/stratum/deploy/Dockerfile.web
    container_name: stratum-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      # Docker-internal API endpoints (rewrite destinations for RSC)
      - STRATUM_API_BASE=http://stratum-api:9302
      - STRATUM_SL_BASE=http://stratum-sl:9304
    depends_on:
      - stratum-api
      - stratum-sl
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/',r=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  stratum-nginx:
    image: nginx:1.27-alpine
    container_name: stratum-nginx
    restart: unless-stopped
    ports:
      - "127.0.0.1:8443:8443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./logs:/var/log/nginx
    depends_on:
      - stratum-api

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: stratum-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${STRATUM_TUNNEL_TOKEN}
    env_file:
      - /home/soffy/.config/keys/.env
    profiles:
      - public

  stratum-sl:
    image: stratum-sl:latest
    build:
      context: /home/soffy/projects
      dockerfile: stratum/deploy/Dockerfile.sl
    container_name: stratum-sl
    restart: unless-stopped
    ports:
      - "127.0.0.1:9304:9304"
    env_file:
      - /home/soffy/.config/keys/.env
    environment:
      # §M3 DB merge: stratum-sl now uses DuckDB (~/.stratum/meta.duckdb).
      # STRATUM_DATABASE_DSN (PG) is no longer used — removed.
      # §merge-2026-06-27: switched to .bak as primary (personal library + all repairs merged in).
      # meta.duckdb.live_backup_20260627 holds the pre-merge live snapshot.
      - STRATUM_DB_PATH=/root/.stratum/meta.duckdb.bak
      # Outbound proxy for YouTube/media ingest (Windows Clash via WSL2 bridge — may change on WSL restart)
      - STRATUM_OUTBOUND_PROXY=http://172.23.224.1:20809
      # PaddleOCR: skip network model-source check, use pre-downloaded models from volume
      - PADDLE_PDX_DISABLE_MODEL_SOURCE_CHECK=True
      # Local embedding via Ollama qwen3-embedding:0.6b (1024-dim, matches DashScope text-embedding-v3)
      - EMBEDDING_PROVIDER=qwen3_local
      - OLLAMA_BASE_URL=http://172.19.0.1:11434
    volumes:
      # Stratum source mounted live — code changes take effect after container restart, no rebuild.
      - /home/soffy/projects/stratum/src:/app/src
      - /home/soffy/projects/stratum/scripts:/app/scripts:ro
      - /home/soffy/projects/stratum/docs:/app/docs:ro
      # Platform packages mounted editable — source changes are live without rebuild
      # Packages live at platform/3O/{pkg} on the host.
      - /home/soffy/projects/platform/3O/obase:/opt/platform/obase
      - /home/soffy/projects/platform/3O/oprim:/opt/platform/oprim
      - /home/soffy/projects/platform/3O/oskill:/opt/platform/oskill
      - /home/soffy/projects/platform/3O/omodul:/opt/platform/omodul
      - /home/soffy/projects/platform/3O/oservi:/opt/platform/oservi
      # Data directory (DuckDB, uploads, etc.)
      - ~/.stratum:/root/.stratum
      # AII shared export volume — Wave 4
      - /home/soffy/shared/stratum-to-aii:/data/shared/stratum-to-aii:rw
      # AII → Stratum needs (ro: AII writes, Stratum reads)
      - /home/soffy/shared/aii-to-stratum:/data/shared/aii-to-stratum:ro
      # Textbook export volume — middle/primary school textbooks
      - /home/soffy/shared/textbook-to-aii:/data/shared/textbook-to-aii:rw
      # User file folders for folder_watcher_service
      - /home/soffy/papers:/mnt/user/papers:ro
      - /home/soffy/books:/mnt/user/books:ro
      # Whisper model — faster-whisper base model (CPU int8)
      - /home/soffy/models/faster-whisper-base:/models/whisper:ro
      # PaddleOCR models — pre-downloaded ONNX models, offline inference
      - /home/soffy/models/paddlex:/root/.paddlex
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9304/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  default:
    name: stratum-net
