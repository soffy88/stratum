version: '3.9'

services:
  stratum-api:
    image: stratum-api:latest
    container_name: stratum-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:9309:9302"
    volumes:
      - ~/.stratum:/root/.stratum
    env_file:
      - /home/soffy/.config/keys/.env
    environment:
      - STRATUM_ENV=production
      - DATABASE_PATH=/data/stratum/meta.duckdb
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9302/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # stratum-web (Next.js) is currently deployed outside Docker.
  # When containerised, set the following in its environment:
  #   STRATUM_API_INTERNAL_URL: http://stratum-api:9302
  # This lets the share/[token] Server Component reach the backend
  # via the Docker internal network instead of localhost.

  stratum-nginx:
    image: nginx:1.27-alpine
    container_name: stratum-nginx
    restart: unless-stopped
    ports:
      - "127.0.0.1:8443:8443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./logs:/var/log/nginx
    depends_on:
      - stratum-api

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: stratum-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    env_file:
      - /home/soffy/.config/keys/.env
    profiles:
      - public

  stratum-sl:
    build:
      context: /home/soffy/projects
      dockerfile: stratum/deploy/Dockerfile.sl
    container_name: stratum-sl
    restart: unless-stopped
    ports:
      - "127.0.0.1:9304:9304"
    env_file:
      - /home/soffy/.config/keys/.env
    environment:
      # Override DSN to use Docker gateway so the container can reach the
      # postgres container that lives in a separate compose project (deploy-postgres-1)
      # exposed on the host at port 5433.
      - STRATUM_DATABASE_DSN=postgresql://stratum:stratum@172.20.0.1:5433/stratum
    volumes:
      # Platform packages mounted editable — source changes are live without rebuild
      - /home/soffy/projects/platform/obase:/opt/platform/obase
      - /home/soffy/projects/platform/oprim:/opt/platform/oprim
      - /home/soffy/projects/platform/oskill:/opt/platform/oskill
      - /home/soffy/projects/platform/omodul:/opt/platform/omodul
      # Data directory (DuckDB, uploads, etc.)
      - ~/.stratum:/root/.stratum
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9304/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  default:
    name: stratum-net
