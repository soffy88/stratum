version: '3.9'

services:
  stratum-api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    container_name: stratum-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:9302:9302"
    volumes:
      - ~/.stratum:/data/stratum
      - ~/.config/keys:/keys:ro
    environment:
      - STRATUM_ENV=production
      - DATABASE_PATH=/data/stratum/meta.duckdb
      - JWT_SECRET_FILE=/keys/.env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9302/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  stratum-nginx:
    image: nginx:1.27-alpine
    container_name: stratum-nginx
    restart: unless-stopped
    ports:
      - "127.0.0.1:8443:8443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./logs:/var/log/nginx
    depends_on:
      - stratum-api

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: stratum-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN_FILE=/secrets/tunnel-token
    volumes:
      - ~/.config/keys/cloudflared:/secrets:ro
    profiles:
      - public

networks:
  default:
    name: stratum-net
