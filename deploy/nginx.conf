worker_processes auto;
events { worker_connections 1024; }

http {
    include /etc/nginx/mime.types;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 100M;

    # Rate limit zones
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=2r/s;

    # Docker internal DNS — lazy upstream resolution so nginx starts
    # even when some containers are temporarily unavailable.
    resolver 127.0.0.11 valid=30s;

    server {
        listen 8443;
        server_name _;

        # Service layer (v1 API) — must be before /api/ catch-all
        location /api/v1/ {
            limit_req zone=api burst=20 nodelay;
            set $stratum_sl http://stratum-sl:9304;
            proxy_pass $stratum_sl;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Host $host;
            proxy_read_timeout 120s;
        }

        # WebSocket push
        location /ws {
            set $stratum_sl http://stratum-sl:9304;
            proxy_pass $stratum_sl;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }

        # Auth endpoints — strict rate limit
        location /api/auth/ {
            limit_req zone=auth burst=5 nodelay;
            set $stratum_api http://stratum-api:9302;
            proxy_pass $stratum_api;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Host $host;
        }

        # General API
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            set $stratum_api http://stratum-api:9302;
            proxy_pass $stratum_api;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Host $host;
        }

        # Public share
        location /share/ {
            set $stratum_api http://stratum-api:9302;
            proxy_pass $stratum_api;
            add_header Cache-Control "public, max-age=300";
        }

        # Health
        location /health {
            set $stratum_api http://stratum-api:9302;
            proxy_pass $stratum_api;
        }

        # Next.js static assets — long cache (filenames are content-hashed)
        location /_next/static/ {
            set $stratum_web http://stratum-web:3000;
            proxy_pass $stratum_web;
            proxy_cache_valid 200 365d;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # Frontend HTML pages — no CDN cache so deploys are instant
        location / {
            set $stratum_web http://stratum-web:3000;
            proxy_pass $stratum_web;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto https;
            # Override Next.js s-maxage so Cloudflare/CDN never caches HTML
            add_header Cache-Control "no-cache, must-revalidate" always;
            proxy_hide_header Cache-Control;
        }

        error_page 502 503 504 /50x.html;
        location = /50x.html {
            return 503 '{"error":"service unavailable"}';
            add_header Content-Type application/json;
        }
    }
}
