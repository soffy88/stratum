worker_processes auto;
events { worker_connections 1024; }

http {
    include /etc/nginx/mime.types;
    sendfile on;
    keepalive_timeout 65;

    # Rate limit zones
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=2r/s;

    upstream stratum_api {
        server stratum-api:9302;
    }

    upstream stratum_sl {
        server stratum-sl:9304;
    }

    upstream stratum_web {
        server 172.20.0.1:3000;
    }

    server {
        listen 8443;
        server_name _;

        # Service layer (v1 API) — must be before /api/ catch-all
        location /api/v1/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://stratum_sl/api/v1/;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Host $host;
            proxy_read_timeout 120s;
        }

        # WebSocket push
        location /ws {
            proxy_pass http://stratum_sl;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }

        # Auth endpoints — strict rate limit
        location /api/auth/ {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass http://stratum_api/api/auth/;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Host $host;
        }

        # General API
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://stratum_api/api/;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Host $host;
        }

        # Public share
        location /share/ {
            proxy_pass http://stratum_api/share/;
            add_header Cache-Control "public, max-age=300";
        }

        # Health
        location /health {
            proxy_pass http://stratum_api/health;
        }

        # Next.js static assets — long cache (filenames are content-hashed)
        location /_next/static/ {
            proxy_pass http://stratum_web;
            proxy_cache_valid 200 365d;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # Frontend HTML pages — no CDN cache so deploys are instant
        location / {
            proxy_pass http://stratum_web;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto https;
            # Override Next.js s-maxage so Cloudflare/CDN never caches HTML
            add_header Cache-Control "no-cache, must-revalidate" always;
            proxy_hide_header Cache-Control;
        }

        error_page 502 503 504 /50x.html;
        location = /50x.html {
            return 503 '{"error":"service unavailable"}';
            add_header Content-Type application/json;
        }
    }
}
